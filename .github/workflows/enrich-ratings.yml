name: Monthly ratings enrichment (free tier)

# Drips Google venue ratings into the next priority metro (LA → NYC → …) within
# the free 1,000/month Place Details cap. Runs on the 2nd of each month (after
# the free tier resets on the 1st). Resumable via the shared enrichment sidecar,
# so it never re-spends and never leaves the free tier.
#
# Requires repo secret GOOGLE_PLACES_API_KEY (plus the existing
# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID used by the deploy workflow).

on:
  schedule:
    - cron: "0 9 2 * *" # 2nd of each month, 09:00 UTC
  workflow_dispatch:
    inputs:
      top:
        description: "Max venues to enrich this run (keep ≤ 950 to stay free)"
        default: "950"

permissions:
  contents: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Enrich next priority metro (within free tier)
        run: node scripts/enrich-next.mjs
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ENRICH_TOP: ${{ github.event.inputs.top || '950' }}

      - name: Publish ratings to the data feed
        run: npm run deploy:data
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Commit updated ratings (triggers app rebuild for rich snippets)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'public/data/*-enrichment.json' 'public/data/**/enrichment.json' \
                  'public/data/*-enrichment-report.json' 'public/data/**/enrichment-report.json' || true
          if git diff --cached --quiet; then
            echo "No enrichment changes to commit."
          else
            git commit -m "data: monthly ratings enrichment (free tier)"
            git push
          fi
