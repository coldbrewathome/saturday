name: Refresh Bay Area Spots

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run ingest:bay-area
      - run: npm run ingest:events
      - run: npm run test
      - run: npm run validate:data
      - run: npm run validate:events
      - run: npm run build
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/data/bay-area-spots.json public/data/events.json public/data/event-build-report.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/bay-area-spots.json public/data/events.json public/data/event-build-report.json
          git commit -m "Refresh Bay Area data"
          git push
