name: Refresh Bay Area Spots

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # The event pipeline uses local-time math (parseIcsDate hard-codes -07:00,
      # inferTimeWindowFromDate calls Date#getHours). Pin the runner to Pacific
      # so tests and validators behave the same as developer machines.
      # (The missing TZ pin is why every scheduled run failed 2026-05-09 →
      # 2026-06-10: tests/eventPipeline.test.mjs bucketed a 14:00 ICS start as
      # "Evening" under UTC. deploy-pages.yml already carried this fix.)
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Ingest Bay Area spots (retry on Overpass 5xx)
        run: |
          for attempt in 1 2 3; do
            npm run ingest:bay-area && exit 0
            echo "Overpass attempt ${attempt} failed; retrying in 60s..."
            sleep 60
          done
          exit 1
      - run: npm run ingest:events
      - run: npm run test
      - run: npm run validate:data
      - run: npm run validate:events
      - run: npm run build

      - name: Publish to Google Indexing API
        if: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS != '' }}
        env:
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}
          GOOGLE_CLOUD_PROJECT: leafy-acumen-468616-d1
        run: npm run publish:indexing

      - name: Commit refreshed data and indexing history
        run: |
          git add public/data
          if [ -f data/indexing-history.json ]; then
            git add data/indexing-history.json
          fi

          if [ -z "$(git status --porcelain --cached)" ]; then
            echo "No data or indexing changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh Bay Area data and indexing history"
          # Concurrent local sessions commit to main; rebase + retry so a push
          # that lands mid-run doesn't reject ours.
          for attempt in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            git rebase --abort 2>/dev/null || true
            echo "Push attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          exit 1

      # Push the freshly scanned JSON to the standalone famhop-data Pages
      # project so the kids and (future) adults frontends always read the
      # latest tagged dataset without redeploying themselves. Skipped silently
      # if Cloudflare credentials aren't configured on the repo.
      # Note: the condition must read the secrets context — a step's own env
      # block is not populated when its `if` is evaluated, so the previous
      # `env.CLOUDFLARE_API_TOKEN != ''` check always skipped this step.
      - name: Deploy shared data feed to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm run build:data-site
          npx wrangler pages deploy data-site/dist \
            --project-name=famhop-data \
            --branch=main \
            --commit-dirty=true
