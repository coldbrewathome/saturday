name: Deploy Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The event pipeline uses local-time math (parseIcsDate hard-codes -07:00,
      # inferTimeWindowFromDate calls Date#getHours). Pin the runner to Pacific
      # so tests and validators behave the same as developer machines.
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run validate:data
      - run: npm run validate:events

      - name: Build kids (FamHop)
        run: npm run build
        env:
          VITE_POLLS_API: "https://saturday-polls.santaclararental2016.workers.dev"
          VITE_GOOGLE_CLIENT_ID: "673443526391-r7oj4up03jd13ti57a6fpq6bcdas91p6.apps.googleusercontent.com"
          VITE_DATA_ORIGIN: "https://famhop-data.pages.dev"
      - name: Deploy FamHop to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=saturday-spots --branch=main --commit-dirty=true

      - name: Build adults (Mosey)
        run: npm run build:adults
      - name: Deploy Mosey to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nighthop --branch=main --commit-dirty=true
