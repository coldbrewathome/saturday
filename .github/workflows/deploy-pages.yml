name: Deploy Web App

on:
  push:
    branches: [main]
  schedule:
    # Friday 13:00 UTC (~6am Pacific) weekly rebuild. The daily refresh-data
    # commits are pushed with GITHUB_TOKEN, which never triggers push
    # workflows, so prerendered SEO pages (editor's picks, this-weekend
    # guides) go stale between manual deploys. This cron re-prerenders both
    # apps with fresh data right before the weekend. Kids deploys before
    # adults in the same job — the builds share dist/ and must stay
    # sequential, never parallel.
    - cron: "0 13 * * 5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The event pipeline uses local-time math (parseIcsDate hard-codes -07:00,
      # inferTimeWindowFromDate calls Date#getHours). Pin the runner to Pacific
      # so tests and validators behave the same as developer machines.
      TZ: America/Los_Angeles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test
      - run: npm run validate:data
      - run: npm run validate:events

      - name: Build kids (FamHop)
        run: npm run build
        env:
          VITE_POLLS_API: "https://saturday-polls.santaclararental2016.workers.dev"
          VITE_GOOGLE_CLIENT_ID: "673443526391-r7oj4up03jd13ti57a6fpq6bcdas91p6.apps.googleusercontent.com"
          VITE_DATA_ORIGIN: "https://famhop-data.pages.dev"
      - name: Deploy FamHop to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=saturday-spots --branch=main --commit-dirty=true

      - name: Build adults (Mosey)
        run: npm run build:adults
      - name: Deploy Mosey to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=nighthop --branch=main --commit-dirty=true

      - name: Publish to Google Indexing API
        if: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS != '' }}
        env:
          GOOGLE_INDEXING_CREDENTIALS: ${{ secrets.GOOGLE_INDEXING_CREDENTIALS }}
          GOOGLE_CLOUD_PROJECT: leafy-acumen-468616-d1
        run: npm run publish:indexing
