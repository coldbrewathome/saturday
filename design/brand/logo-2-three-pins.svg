<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <title>FamHop — Three Pins</title>
  <rect width="600" height="600" rx="80" fill="#EAF5FB"/>

  <g fill="#1B3A57" opacity="0.18">
    <circle cx="175" cy="360" r="5"/>
    <circle cx="300" cy="360" r="5"/>
    <circle cx="425" cy="360" r="5"/>
  </g>

  <path d="M 175 320 Q 237 170 300 320" stroke="#4DA8DA" stroke-width="4" stroke-dasharray="5 9" stroke-linecap="round" fill="none"/>
  <path d="M 300 320 Q 363 170 425 320" stroke="#4DA8DA" stroke-width="4" stroke-dasharray="5 9" stroke-linecap="round" fill="none"/>

  <path d="M 175 320 L 163 295 L 187 295 Z" fill="#4DA8DA"/>
  <circle cx="175" cy="270" r="28" fill="#4DA8DA"/>
  <circle cx="175" cy="270" r="11" fill="#FFFFFF"/>

  <path d="M 300 320 L 286 290 L 314 290 Z" fill="#FFC857"/>
  <circle cx="300" cy="262" r="36" fill="#FFC857"/>
  <circle cx="300" cy="262" r="13" fill="#1B3A57"/>

  <path d="M 425 320 L 413 295 L 437 295 Z" fill="#4DA8DA"/>
