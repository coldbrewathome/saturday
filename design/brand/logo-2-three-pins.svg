  <circle cx="425" cy="270" r="11" fill="#FFFFFF"/>

  <text x="300" y="450" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="92" font-weight="900" fill="#1B3A57" text-anchor="middle" letter-spacing="-3">famhop</text>

  <text x="300" y="500" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="17" font-weight="600" fill="#4DA8DA" text-anchor="middle" letter-spacing="5">THREE STOPS. ONE GREAT DAY.</text>
</svg>
