<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <title>FamHop — Three pins share image</title>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2F9FC"/>
      <stop offset="100%" stop-color="#DDEEF7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <g stroke="#4DA8DA" stroke-width="1" opacity="0.12">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <text x="80" y="130" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="76" font-weight="900" fill="#1B3A57" letter-spacing="-2">Three stops.</text>
  <text x="80" y="210" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="76" font-weight="900" fill="#1B3A57" letter-spacing="-2">One great day.</text>
  <text x="80" y="260" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="20" font-weight="700" fill="#4DA8DA" letter-spacing="5">FAMILY OUTINGS PLANNED IN A TAP</text>

  <path d="M 250 460 Q 380 320 500 460" stroke="#4DA8DA" stroke-width="4" stroke-dasharray="6 10" stroke-linecap="round" fill="none"/>
  <path d="M 500 460 Q 620 320 740 460" stroke="#4DA8DA" stroke-width="4" stroke-dasharray="6 10" stroke-linecap="round" fill="none"/>
  <path d="M 740 460 Q 860 320 980 460" stroke="#4DA8DA" stroke-width="4" stroke-dasharray="6 10" stroke-linecap="round" fill="none"/>

  <g transform="translate(250, 460)">
    <path d="M 0 0 L -10 -22 L 10 -22 Z" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="26" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="10" fill="#FFFFFF"/>
    <text x="0" y="40" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="20" font-weight="700" fill="#1B3A57">Park</text>
  </g>
  <g transform="translate(500, 460)">
    <path d="M 0 0 L -12 -28 L 12 -28 Z" fill="#FFC857"/>
    <circle cx="0" cy="-54" r="32" fill="#FFC857"/>
    <circle cx="0" cy="-54" r="12" fill="#1B3A57"/>
    <text x="0" y="40" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="20" font-weight="700" fill="#1B3A57">Library</text>
  </g>
  <g transform="translate(740, 460)">
    <path d="M 0 0 L -10 -22 L 10 -22 Z" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="26" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="10" fill="#FFFFFF"/>
    <text x="0" y="40" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="20" font-weight="700" fill="#1B3A57">Snack stop</text>
  </g>
  <g transform="translate(980, 460)">
    <path d="M 0 0 L -10 -22 L 10 -22 Z" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="26" fill="#4DA8DA"/>
    <circle cx="0" cy="-46" r="10" fill="#FFFFFF"/>
    <text x="0" y="40" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="20" font-weight="700" fill="#1B3A57">Home</text>
  </g>

  <text x="1120" y="585" text-anchor="end" font-family="Avenir Next, Helvetica Neue, sans-serif" font-size="44" font-weight="900" fill="#1B3A57" letter-spacing="-2">famhop</text>
  <text x="1120" y="610" text-anchor="end" font-family="Avenir Next, sans-serif" font-size="13" font-weight="800" fill="#4DA8DA" letter-spacing="4">.COM</text>
</svg>
