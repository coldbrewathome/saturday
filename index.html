<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index,follow" />
    <title>%VITE_APP_OG_TITLE%</title>
    <meta name="description" content="%VITE_APP_OG_DESCRIPTION%" />
    <meta
      name="keywords"
      content="%VITE_APP_KEYWORDS%"
    />
    <link rel="canonical" href="%VITE_APP_SITE_URL%" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!--
      Preconnect only to hosts hit on the critical path. The polls/state
      worker is fetched eagerly on app boot for sign-in + user state, so
      paying the TLS handshake up front is worth it. Tiles, image CDNs, and
      Google Identity are touched later (after JS runs, after the map opens,
      or only when the user clicks sign-in), so a cheap DNS resolution is
      enough — full preconnect just burns a TLS slot during LCP.
    -->
    <link rel="preconnect" href="https://saturday-polls.santaclararental2016.workers.dev" crossorigin />
    <link rel="dns-prefetch" href="https://a.tile.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://commons.wikimedia.org" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://accounts.google.com" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_APP_BRAND%" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="%VITE_APP_OG_TITLE%" />
    <meta property="og:description" content="%VITE_APP_OG_DESCRIPTION%" />
    <meta property="og:image" content="%VITE_APP_OG_IMAGE%" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="%VITE_APP_OG_TITLE%" />
    <meta property="og:url" content="%VITE_APP_SITE_URL%" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_APP_OG_TITLE%" />
    <meta name="twitter:description" content="%VITE_APP_OG_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_APP_OG_IMAGE%" />
    <meta name="twitter:image:alt" content="%VITE_APP_OG_TITLE%" />

    <meta name="theme-color" content="%VITE_APP_THEME_COLOR%" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "%VITE_APP_SITE_URL%#website",
            "url": "%VITE_APP_SITE_URL%",
            "name": "%VITE_APP_BRAND%",
            "description": "%VITE_APP_OG_DESCRIPTION%",
            "inLanguage": "en-US",
            "publisher": { "@id": "%VITE_APP_SITE_URL%#org" }
          },
          {
            "@type": "Organization",
            "@id": "%VITE_APP_SITE_URL%#org",
            "name": "%VITE_APP_BRAND%",
            "url": "%VITE_APP_SITE_URL%",
            "slogan": "%VITE_APP_TAGLINE%"
          },
          {
            "@type": "WebApplication",
            "@id": "%VITE_APP_SITE_URL%#app",
            "name": "%VITE_APP_BRAND%",
            "url": "%VITE_APP_SITE_URL%",
            "applicationCategory": "LifestyleApplication",
            "operatingSystem": "Web",
            "browserRequirements": "Requires JavaScript",
            "description": "%VITE_APP_OG_DESCRIPTION%",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root">
      <noscript>
        <header>
          <h1>%VITE_APP_OG_TITLE%</h1>
          <p>%VITE_APP_OG_DESCRIPTION%</p>
        </header>
        <section>
          <h2>Choose your metro</h2>
          <p>
            <a href="/bay-area/">San Francisco Bay Area</a>,
            <a href="/los-angeles/">Los Angeles</a>, <a href="/new-york-city/">New York City</a>,
            <a href="/seattle/">Seattle</a>, <a href="/chicago/">Chicago</a>,
            <a href="/dallas-fort-worth/">Dallas-Fort Worth</a>, <a href="/houston/">Houston</a>,
            <a href="/washington-dc/">Washington DC</a>, <a href="/atlanta/">Atlanta</a>,
            <a href="/philadelphia/">Philadelphia</a>, <a href="/miami/">Miami</a>,
            <a href="/phoenix/">Phoenix</a>, <a href="/boston/">Boston</a>,
            and <a href="/san-diego/">San Diego</a>.
          </p>
        </section>
        <p><strong>Heads-up:</strong> This is an interactive planner — please enable JavaScript to plan, share and vote.</p>
      </noscript>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
