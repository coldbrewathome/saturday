name = "saturday-polls"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "POLLS"
id = "dd49dd61e74b4823b9427a91df59eb3e"
preview_id = "faf719bcc4994f84bd88b6181ecfbe06"

[vars]
ALLOWED_ORIGINS = "http://localhost:5173,https://coldbrewathome.github.io,https://saturday-spots.pages.dev,https://famhop.com,https://www.famhop.com,https://nighthop.pages.dev,https://famhop-data.pages.dev"
OPENAI_MODEL = "gpt-5.4"
GOOGLE_CLIENT_ID = "673443526391-r7oj4up03jd13ti57a6fpq6bcdas91p6.apps.googleusercontent.com"
AI_DAILY_LIMIT_PER_IP = "10"
ADMIN_EMAILS = "kaining.usc@gmail.com"
# Set NEWSLETTER_ENABLED = "true" to flip sendWeekendDigest from no-op
# to a real Resend send (requires the RESEND_API_KEY secret below).
# Set NEWSLETTER_TEST_ALLOWLIST = "you@example.com,other@..." to scope
# a send to a fixed set of addresses (anything else is filtered out and
# returned as an error). Leave unset for production list sends.

# Secrets (set via `wrangler secret put <NAME>`, never commit values):
#   NEWSLETTER_ADMIN_TOKEN — bearer token required by POST /newsletter/send
#   RESEND_API_KEY — Resend API key used by sendWeekendDigest (worker/src/newsletter.ts)
